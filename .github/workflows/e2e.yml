name: E2E

# Runs the Playwright suite against the deployed test environment.
# Configure repo secrets: TEST_BASE_URL, TEST_EMAIL, TEST_PASSWORD, ADMIN_API_KEY (optional).
# The unauth suite needs only TEST_BASE_URL; auth tests need the disposable account creds.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *' # nightly at 03:00 UTC

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run safe suite (unauth + API)
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: npm run test:safe

      - name: Run authenticated suite
        # Only when the disposable account credentials are configured.
        if: ${{ secrets.TEST_EMAIL != '' && secrets.TEST_PASSWORD != '' }}
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: npm run test:auth

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30
